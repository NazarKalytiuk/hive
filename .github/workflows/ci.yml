name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            run_smoke: true
            run_extra_checks: true
          - os: macos-latest
            label: macOS
            run_smoke: true
            run_extra_checks: false
          - os: windows-latest
            label: Windows
            run_smoke: false
            run_extra_checks: false

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Format check
        if: matrix.run_extra_checks
        run: cargo fmt --check

      - name: Clippy
        if: matrix.run_extra_checks
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install cargo-audit
        if: matrix.run_extra_checks
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        if: matrix.run_extra_checks
        run: cargo audit

      - name: Build workspace
        run: cargo build --workspace

      - name: Test demo-server
        run: cargo test -p demo-server

      - name: Test tarn libs and bins
        run: cargo test -p tarn --lib --bins

      - name: Test tarn integration suite
        run: cargo test -p tarn --test integration_test

      - name: Test tarn-mcp
        run: cargo test -p tarn-mcp

      - name: Test tarn-lsp
        run: cargo test -p tarn-lsp

      - name: Package tarn crate
        if: matrix.run_extra_checks
        run: cargo package -p tarn

      - name: Build release binaries
        run: cargo build --release -p tarn -p tarn-mcp -p tarn-lsp -p demo-server

      - name: Release-path smoke test
        if: matrix.run_smoke
        shell: bash
        run: bash scripts/ci/smoke.sh

      - name: Tarn version smoke
        if: ${{ !matrix.run_smoke }}
        run: cargo run --quiet --release -p tarn -- --version

  conformance:
    name: Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: conformance

      - name: Run public conformance suite
        run: cargo test -p tarn --test conformance_test
